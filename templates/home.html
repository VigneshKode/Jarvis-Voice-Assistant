<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Jarvis</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="../static/home.js"></script>
    <style>
      @import url("https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css");

      .main {
        border-color: white;
        border-radius: 40px;
        border-width: 4px;
        margin: 50px;
        height: 800px;
        padding: 20px;
      }
      .logo {
        margin-left: 20px;
        margin-top: 10px;
        color: black;
        font-weight: bolder;
        text-decoration: none;
      }

      #conversation {
        border: black;
        border: 10px;
        font-weight: bolder;
        padding: 10px;
        z-index: 9999;
        border-radius: 10px;
        overflow-y: auto; /* Enable scrolling if content exceeds container height */
        max-height: calc(100% - 150px); /* Limit conversation height */
        backdrop-filter: blur(30px); /* Adjust the blur amount as needed */
      }

      #input-container {
        display: flex;
        align-items: center;
        margin-top: 10px; /* Space between conversation and input */
      }

      #user_input {
        padding: 10px;
        border: 1px solid #ccc; /* Light gray border */
        border-radius: 5px;
        margin-right: 10px; /* Space between input and submit button */
      }
      #submit {
        background-color: #007bff; /* Bootstrap primary color */
        color: white;
        border: none;
        font-size: medium;
        padding-right: 20px;
        border-radius: 5px;
        cursor: pointer;
        margin-left: -30px; /* Adjust the negative margin to move the button slightly to the left */
      }

      /* Mic button icon */
      .bi-mic-fill {
        font-size: 24px; /* Adjust size as needed */
        height: 30px;
        width: 40px;
      }
      /* Button hover effect */
      #submit:hover {
        background-color: #0056b3; /* Darken color on hover */
      }
      #input-container {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        background-color: black; /* Adjusted background color */
        padding: 10px;
        border-radius: 10px;
        width: 90vh;
      }

      #input-container input[type="text"] {
        width: 70%; /* Adjusted width */
        padding: 8px; /* Adjusted padding */
        margin-right: 180px; /* Added margin */
        border: none;
        border-radius: 5px;
        font-family: "Poppins", sans-serif;
        outline: none;
        background-color: #000; /* Adjusted background color */
        color: white;
        margin-left: 10px;
      }

      #input-container button {
        background-color: black; /* Adjusted background color */
        color: white;
        border: none;
        border-radius: 5px;
        padding-top: 2px;
        width: 35px;
        cursor: pointer;
        outline: none;
      }

      #input-container button:hover {
        background-color: black; /* Adjusted hover color */
      }

      #mic-voice {
        width: 15px;
        height: 40px;
        margin-top: -20px; /* Adjust as needed */
      }
      #submit {
        width: 120px;
        height: 40px;
        margin-top: 0px; /* Adjust as needed */
      }
      .parallax img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        z-index: -1; /* Set z-index to a negative value to place it behind everything */
      }
    </style>
  </head>
  <body>
    <section class="parallax">
      <img src="../static/hill1.png" id="hill1" />
      <img src="../static/hill2.png" id="hill2" />
      <img src="../static/hill3.png" id="hill3" />
      <img src="../static/hill4.png" id="hill4" />
      <img src="../static/hill5.png" id="hill5" />
      <img src="../static/tree.png" id="tree" />
      <img src="../static/leaf.png" id="leaf" />
      <img src="../static/plant.png" id="plant" />
    </section>
    <div class="main">
      <a href="/"><button id="logout">LOGOUT</button></a>
      <div class="logout"></div>
      <div id="conversation"></div>
      <div id="input-container">
        <div id="mic-buttons">
          <button id="mic-voice">
            <i class="bi bi-mic" style="font-size: 22px; margin-right: 5px"></i>
          </button>
        </div>
        <input type="text" id="user_input" placeholder="Type your message" />
        <button id="submit" style="display: none">Submit</button>
      </div>
    </div>
  </body>
</html>
